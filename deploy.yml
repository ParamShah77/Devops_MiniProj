- name: Configure Local Machine and Deploy Web App
  hosts: local
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Node.js and NPM
      apt:
        name:
          - nodejs
          - npm
        state: present

    - name: Create app directory
      file:
        path: /home/{{ ansible_user_id }}/myapp
        state: directory
        owner: "{{ ansible_user_id }}"

    - name: Copy code from workspace to local machine
      copy:
        src: ./
        dest: /home/{{ ansible_user_id }}/myapp/

    - name: Install Backend dependencies
      command: npm install
      args:
        chdir: /home/{{ ansible_user_id }}/myapp/Backend/

    - name: Install Frontend dependencies
      command: npm install
      args:
        chdir: /home/{{ ansible_user_id }}/myapp/Frontend/

    - name: Create Frontend environment file
      copy:
        content: "NEXT_PUBLIC_API_URL=http://localhost:5000/api\n"
        dest: /home/{{ ansible_user_id }}/myapp/Frontend/.env.local

    - name: Start Backend server
      shell: nohup node server.js > backend.log 2>&1 &
      args:
        chdir: /home/{{ ansible_user_id }}/myapp/Backend/

    - name: Start Frontend server
      shell: nohup env HOST=0.0.0.0 npm run dev > frontend.log 2>&1 &
      args:
        chdir: /home/{{ ansible_user_id }}/myapp/Frontend/
