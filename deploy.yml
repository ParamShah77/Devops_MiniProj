- name: Configure Local Machine and Deploy Web App
  hosts: local

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Node.js and NPM
      apt:
        name:
          - nodejs
          - npm
        state: present

    - name: Create app directory
      file:
        path: /home/{{ ansible_user_id }}/myapp
        state: directory
        owner: "{{ ansible_user_id }}"

    - name: Copy project files
      synchronize:
        src: ./
        dest: /home/{{ ansible_user_id }}/myapp/
        recursive: yes
        delete: no
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
          - "--exclude=.scannerwork"
          - "--exclude=Frontend/node_modules"
          - "--exclude=Backend/node_modules"

    - name: Install Backend dependencies
      npm:
        path: /home/{{ ansible_user_id }}/myapp/Backend/

    - name: Install Frontend dependencies
      npm:
        path: /home/{{ ansible_user_id }}/myapp/Frontend/

    - name: Create Frontend environment file
      copy:
        content: |
          NEXT_PUBLIC_API_URL=http://localhost:5000/api
        dest: /home/{{ ansible_user_id }}/myapp/Frontend/.env.local

    - name: Kill existing backend process
      shell: pkill -f "node server.js"
      ignore_errors: yes

    - name: Kill existing frontend process
      shell: pkill -f "next"
      ignore_errors: yes

    - name: Start Backend server
      shell: nohup node server.js > backend.log 2>&1 &
      args:
        chdir: /home/{{ ansible_user_id }}/myapp/Backend/

    - name: Start Frontend server
      shell: nohup env HOST=0.0.0.0 npm run dev > frontend.log 2>&1 &
      args:
        chdir: /home/{{ ansible_user_id }}/myapp/Frontend/