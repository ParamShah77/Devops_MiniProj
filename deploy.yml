- name: Configure Local Machine and Deploy Web App
  hosts: local

  tasks:

    - name: Create app directory
      file:
        path: /var/jenkins_home/myapp
        state: directory

    - name: Copy project files
      synchronize:
        src: ./
        dest: /var/jenkins_home/myapp
        recursive: yes
        delete: no
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.git"
          - "--exclude=.scannerwork"
          - "--exclude=Frontend/node_modules"
          - "--exclude=Backend/node_modules"

    - name: Install Backend dependencies
      npm:
        path: /var/jenkins_home/myapp/Backend/

    - name: Install Frontend dependencies
      npm:
        path: /var/jenkins_home/myapp/Frontend/

    - name: Create Frontend environment file
      copy:
        content: |
          NEXT_PUBLIC_API_URL=http://localhost:5000/api
        dest: /var/jenkins_home/myapp/Frontend/.env.local

    - name: Create Backend environment file
      copy:
        content: |
          MONGODB_URI=mongodb://host.docker.internal:27017/university
          PORT=5000
          NODE_ENV=development
        dest: /var/jenkins_home/myapp/Backend/.env

    - name: Kill existing backend process
      shell: pkill -f "node server.js"
      ignore_errors: yes

    - name: Kill existing frontend process
      shell: pkill -f "next"
      ignore_errors: yes

    - name: Start Backend server
      shell: nohup node server.js > backend.log 2>&1 &
      args:
        chdir: /var/jenkins_home/myapp/Backend/

    - name: Start Frontend server
      shell: nohup env HOST=0.0.0.0 npm run dev > frontend.log 2>&1 &
      args:
        chdir: /var/jenkins_home/myapp/Frontend/